<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PayControl — Вход</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#6366f1" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="PayControl" />
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="login.css" />
  <!-- Подключаем PocketBase SDK вместо Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/pocketbase@0.21.0/dist/pocketbase.umd.js"></script>
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-card">

      <div class="auth-logo">
        <div class="logo-mark">₽</div>
        <span class="logo-title">PayControl</span>
      </div>

      <!-- Сообщение об ошибке или успехе (показывается динамически) -->
      <div class="auth-message" id="authMessage"></div>

      <!-- РЕЖИМ 1: Обычный вход/регистрация -->
      <div id="modeAuth">
        <div class="auth-tabs">
          <button class="auth-tab active" id="tabLogin" onclick="switchTab('login')">Войти</button>
          <button class="auth-tab" id="tabRegister" onclick="switchTab('register')">Регистрация</button>
        </div>

        <!-- Форма входа -->
        <form class="auth-form" id="formLogin" onsubmit="handleLogin(event)">
          <div class="form-row">
            <label for="loginEmail">Email</label>
            <input id="loginEmail" type="email" placeholder="your@email.com" required />
          </div>
          <div class="form-row">
            <label for="loginPassword">Пароль</label>
            <div class="password-wrap">
              <input id="loginPassword" type="password" placeholder="Введите пароль" required />
              <button type="button" class="eye-btn" onclick="togglePassword('loginPassword', this)" tabindex="-1">👁</button>
            </div>
          </div>
          <button class="btn btn-primary btn-auth" type="submit" id="btnLogin">Войти</button>
        </form>

        <!-- Форма регистрации (скрыта по умолчанию) -->
        <form class="auth-form" id="formRegister" style="display:none;" onsubmit="handleRegister(event)">
          <div class="form-row">
            <label for="regEmail">Email</label>
            <input id="regEmail" type="email" placeholder="your@email.com" required />
          </div>
          <div class="form-row">
            <label for="regPassword">Пароль</label>
            <div class="password-wrap">
              <input id="regPassword" type="password" placeholder="Минимум 8 символов" minlength="8" required />
              <button type="button" class="eye-btn" onclick="togglePassword('regPassword', this)" tabindex="-1">👁</button>
            </div>
          </div>
          <div class="form-row">
            <label for="regPasswordConfirm">Подтвердите пароль</label>
            <div class="password-wrap">
              <input id="regPasswordConfirm" type="password" placeholder="Повторите пароль" required />
              <button type="button" class="eye-btn" onclick="togglePassword('regPasswordConfirm', this)" tabindex="-1">👁</button>
            </div>
          </div>
          <button class="btn btn-primary btn-auth" type="submit" id="btnRegister">Создать аккаунт</button>
        </form>

        <!-- Ссылка "Забыли пароль?" под формой входа -->
        <div class="auth-footer-link" id="forgotLink">
          <a onclick="switchMode('forgot')">Забыли пароль?</a>
        </div>
      </div>

      <!-- РЕЖИМ 2: Запрос сброса пароля -->
      <div id="modeForgot" style="display:none;">
        <div class="auth-title">Восстановление пароля</div>
        <p style="text-align:center; color: var(--text-secondary); font-size:14px; margin-bottom:20px;">
          Введите email — мы отправим ссылку для сброса пароля
        </p>
        <form class="auth-form" id="formForgot" onsubmit="handleForgot(event)">
          <div class="form-row">
            <label for="forgotEmail">Email</label>
            <input id="forgotEmail" type="email" placeholder="your@email.com" required />
          </div>
          <button class="btn btn-primary btn-auth" type="submit" id="btnForgot">Отправить письмо</button>
        </form>
        <div class="auth-footer-link">
          <a onclick="switchMode('auth')">← Вернуться ко входу</a>
        </div>
      </div>

      <!-- РЕЖИМ 3: Установка нового пароля (по ссылке из письма) -->
      <div id="modeReset" style="display:none;">
        <div class="auth-title">Новый пароль</div>
        <form class="auth-form" id="formReset" onsubmit="handleReset(event)">
          <div class="form-row">
            <label for="resetPassword">Новый пароль</label>
            <div class="password-wrap">
              <input id="resetPassword" type="password" placeholder="Минимум 8 символов" minlength="8" required />
              <button type="button" class="eye-btn" onclick="togglePassword('resetPassword', this)" tabindex="-1">👁</button>
            </div>
          </div>
          <div class="form-row">
            <label for="resetPasswordConfirm">Подтвердите пароль</label>
            <div class="password-wrap">
              <input id="resetPasswordConfirm" type="password" placeholder="Повторите пароль" required />
              <button type="button" class="eye-btn" onclick="togglePassword('resetPasswordConfirm', this)" tabindex="-1">👁</button>
            </div>
          </div>
          <button class="btn btn-primary btn-auth" type="submit" id="btnReset">Сохранить пароль</button>
        </form>
      </div>

    </div>
  </div>

  <script>
    // Инициализация PocketBase.
    // В отличие от Supabase, здесь нет anon key — только URL нашего сервера.
    // PocketBase сам управляет токенами через localStorage.
    const pb = new PocketBase('https://paycontrol.dcmr.ru/pb');

    // --- Вспомогательные функции ---

    function showMessage(text, type) {
      const el = document.getElementById('authMessage');
      el.textContent = text;
      el.className = 'auth-message ' + type;
    }

    function hideMessage() {
      document.getElementById('authMessage').className = 'auth-message';
    }

    function setLoading(btnId, loading) {
      const btn = document.getElementById(btnId);
      btn.disabled = loading;
      btn.style.opacity = loading ? '0.6' : '1';
    }

    function switchTab(tab) {
      hideMessage();
      const isLogin = tab === 'login';
      document.getElementById('formLogin').style.display = isLogin ? 'block' : 'none';
      document.getElementById('formRegister').style.display = isLogin ? 'none' : 'block';
      document.getElementById('tabLogin').classList.toggle('active', isLogin);
      document.getElementById('tabRegister').classList.toggle('active', !isLogin);
    }

    // --- Обработчики форм ---

    async function handleLogin(e) {
      e.preventDefault();
      hideMessage();
      setLoading('btnLogin', true);

      const email = document.getElementById('loginEmail').value;
      const password = document.getElementById('loginPassword').value;

      try {
        // В Supabase: sbClient.auth.signInWithPassword({ email, password })
        // В PocketBase: pb.collection('customers').authWithPassword(email, password)
        // После успешного входа PocketBase автоматически сохраняет токен в localStorage.
        await pb.collection('customers').authWithPassword(email, password);
        window.location.href = 'index.html';
      } catch (e) {
        setLoading('btnLogin', false);
        showMessage('Ошибка входа: неверный email или пароль', 'error');
      }
    }

    async function handleRegister(e) {
      e.preventDefault();
      hideMessage();

      const email = document.getElementById('regEmail').value;
      const password = document.getElementById('regPassword').value;
      const confirm = document.getElementById('regPasswordConfirm').value;

      if (password !== confirm) {
        showMessage('Пароли не совпадают', 'error');
        return;
      }

      setLoading('btnRegister', true);

      try {
        // В Supabase регистрация была через sbClient.auth.signUp({ email, password }).
        // В PocketBase создаём запись в коллекции customers.
        // passwordConfirm — обязательное поле PocketBase при создании пользователя.
        await pb.collection('customers').create({
          email,
          password,
          passwordConfirm: confirm
        });

        // После регистрации сразу логиним пользователя — чтобы не заставлять
        // его вводить пароль повторно.
        await pb.collection('customers').authWithPassword(email, password);
        window.location.href = 'index.html';
      } catch (e) {
        setLoading('btnRegister', false);
        showMessage('Ошибка регистрации: ' + e.message, 'error');
      }
    }

    function togglePassword(inputId, btn) {
      const input = document.getElementById(inputId);
      const isHidden = input.type === 'password';
      input.type = isHidden ? 'text' : 'password';
      btn.textContent = isHidden ? '🙈' : '👁';
    }

    // Инициализация: если пользователь уже залогинен — сразу на главную.
    // В Supabase была асинхронная getSession(), в PocketBase — мгновенная проверка isValid.
    // --- Переключение режимов (вход/регистрация, забыл пароль, сброс пароля) ---

    function switchMode(mode) {
      hideMessage();
      document.getElementById('modeAuth').style.display   = mode === 'auth'   ? 'block' : 'none';
      document.getElementById('modeForgot').style.display = mode === 'forgot' ? 'block' : 'none';
      document.getElementById('modeReset').style.display  = mode === 'reset'  ? 'block' : 'none';
    }

    // --- Запрос сброса пароля ---

    async function handleForgot(e) {
      e.preventDefault();
      hideMessage();
      setLoading('btnForgot', true);

      const email = document.getElementById('forgotEmail').value;

      try {
        // PocketBase отправляет письмо со ссылкой на сброс пароля.
        // Ссылка будет вести на наш login.html?token=... (настраивается в Pocketbase Admin).
        await pb.collection('customers').requestPasswordReset(email);
        showMessage('Письмо отправлено! Проверьте почту.', 'success');
        setLoading('btnForgot', false);
      } catch (e) {
        setLoading('btnForgot', false);
        showMessage('Ошибка: ' + e.message, 'error');
      }
    }

    // --- Сохранение нового пароля ---

    async function handleReset(e) {
      e.preventDefault();
      hideMessage();

      const password = document.getElementById('resetPassword').value;
      const confirm  = document.getElementById('resetPasswordConfirm').value;

      if (password !== confirm) {
        showMessage('Пароли не совпадают', 'error');
        return;
      }

      setLoading('btnReset', true);

      try {
        // Читаем токен из URL: login.html?token=XXXXX
        const params = new URLSearchParams(window.location.search);
        const token  = params.get('token');

        if (!token) {
          showMessage('Ссылка недействительна или устарела', 'error');
          setLoading('btnReset', false);
          return;
        }

        await pb.collection('customers').confirmPasswordReset(token, password, confirm);
        showMessage('Пароль успешно изменён!', 'success');

        // Через 2 секунды переходим на страницу входа
        setTimeout(() => switchMode('auth'), 2000);
        setLoading('btnReset', false);
      } catch (e) {
        setLoading('btnReset', false);
        showMessage('Ошибка: ссылка недействительна или устарела', 'error');
      }
    }

    function init() {
      const storedTheme = localStorage.getItem('paycontrol_theme') || 'dark';
      document.documentElement.setAttribute('data-theme', storedTheme);

      if (pb.authStore.isValid) {
        window.location.href = 'index.html';
        return;
      }

      // Если в URL есть параметр token — показываем режим сброса пароля
      const params = new URLSearchParams(window.location.search);
      if (params.get('token')) {
        switchMode('reset');
      }
    }

    init();
  </script>
</body>
</html>
